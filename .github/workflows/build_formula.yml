on:
  workflow_call:
    inputs:
      formula:
        required: true
        description: Name of formula to build, without "<user>/<repo>/" prefix
        type: string
      os:
        required: true
        type: string
        description: What operating system to build on
    outputs:
      tag-array:
        value: ${{ jobs.bottle-and-tag.outputs.tag-array }}

jobs:
  build:
    runs-on: ${{ inputs.os }}
    outputs:
      tag-array: ${{ steps.build-bottle.outputs.tag-array }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - uses: Homebrew/actions/git-user-config@master

      - uses: Homebrew/actions/setup-homebrew@master

      - uses: charitybell/set-git-url-action@main
        with:
          token: ${{ github.token }}

      - name: build bottle (${{ inputs.formula }})
        id: build-bottle
        run: |
          FORMULA_NAME="${{ github.repository }}/$(basename ${{ inputs.formula }} .rb)"
          brew install --build-bottle "$FORMULA_NAME"
          brew bottle --force-core-tap --json \
            --root-url ${{ github.server_url }}/${{ github.repository }}/releases/download/$FORMULA_NAME/$FORMULA_VERSION \
            "$FORMULA_NAME"
          BASE_FILENAME=$(basename $(jq -r '.[].bottle.tags|.[].filename' $(basename $FORMULA_NAME)-*bottle.*json) .tar.gz)
          BASE_LOCAL_FILENAME=$(basename $(jq -r '.[].bottle.tags|.[].local_filename' $(basename $FORMULA_NAME)-*bottle.*json) .tar.gz)
          mv $BASE_LOCAL_FILENAME.tar.gz $BASE_FILENAME.tar.gz

      - name: bottle and tag
        id: bottle-and-tag
        run: |
          TAG_ARRAY={}
          for formula in $(echo '${{ inputs.formula }}' | jq -rc .[]); do
            FORMULA_NAME="$(basename $formula .rb)"
            FORMULA_TAP=$(echo ${{ github.repository }} | cut -d / -f 1)/$(echo ${{ github.repository }} | cut -d / -f 2 | cut -d - -f 2)/$FORMULA_NAME
            FORMULA_VERSION=$(jq -cr .['"'$FORMULA_TAP'"'].formula.pkg_version ${FORMULA_NAME}-*.bottle.json | head -n 1)
            TAG_MESSAGE="${FORMULA_NAME}-${FORMULA_VERSION}"

            ls
            echo brew bottle --merge --write \
              --root-url ${{ github.server_url }}/${{ github.repository }}/releases/download/$FORMULA_NAME/$FORMULA_VERSION \
              ${FORMULA_NAME}-*.bottle.*json

            brew bottle --merge --write \
              --root-url ${{ github.server_url }}/${{ github.repository }}/releases/download/$FORMULA_NAME/$FORMULA_VERSION \
              ${FORMULA_NAME}-*.bottle.*json

            git tag -a "$TAG_MESSAGE" -m "$TAG_MESSAGE"
            TAG_ARRAY=$(echo $TAG_ARRAY | jq -rc '. += {"'$formula'":"'$TAG_MESSAGE'"}')
          done
          git -c push.default=current push --tags
          git -c push.default=current push
          echo $TAG_ARRAY

          echo "tag-array=$TAG_ARRAY" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v3
        with:
          name: formula-bottles
          path: |
            *.bottle.tar.gz
            *.bottle.json
