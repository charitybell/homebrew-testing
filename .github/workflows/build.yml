on:
  workflow_call:
    inputs:
      formula:
        required: true
        description: Name of formula to build, without "<user>/<repo>/" prefix
        type: string
      os:
        required: true
        type: string
        description: What operating system to build on
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - run: echo '${{ fromJSON(github.event) }}'
  build:
    runs-on: ${{ github.event.inputs.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: echo ${{ github.event.inputs.formula }} >> ${{ github.event.inputs.formula }}.txt
      - uses: actions/upload-artifact@v3
        with:
          name: formula-bottles
          path: ${{ github.event.inputs.formula }}.txt
