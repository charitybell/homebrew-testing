on:
  workflow_call:
    inputs:
      formula:
        required: true
        description: Name of formula to build, without "<user>/<repo>/" prefix
        type: string
      os:
        required: true
        type: string
        description: What operating system to build on
jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: echo ${{ inputs.formula }} >> ${{ inputs.formula }}.txt
      - uses: actions/upload-artifact@v3
        with:
          name: formula-bottles
          path: ${{ inputs.formula }}.txt
