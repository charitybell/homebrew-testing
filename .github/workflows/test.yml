on:
  workflow_dispatch:
    inputs:
      formula:
        required: true
        description: Name of formula to build, without "<user>/<repo>/" prefix
        type: string
      os:
        required: true
        type: string
        description: What operating system to build on
jobs:
  runs-on: ubuntu-latest
  prepare:
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

  call:
    steps:
      - uses: ./.github/workflows/build.yml
        with:
          formula: ${{ github.event.inputs.formula }}
          os: ${{ github.event.inputs.os }}

  check:
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: formula-bottles
      - run: |
          ls
          cat ${{github.event.inputs.formula }}.txt
          [ "${{ github.event.inputs.formula }}" == "$(cat ${{github.event.inputs.formula }}.txt)" ]
